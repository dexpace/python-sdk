name: Bug report
description: Something behaves incorrectly
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which distribution is affected?
      options:
        - dexpace-sdk-core
        - dexpace-sdk-http-stdlib
        - dexpace-sdk-http-httpx
        - dexpace-sdk-http-aiohttp
        - dexpace-sdk-http-requests
        - not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that triggers the bug.
      render: python
    validations:
      required: true
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / output
      render: text
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version(s)
      placeholder: "dexpace-sdk-core 0.1.0"
    validations:
      required: true
